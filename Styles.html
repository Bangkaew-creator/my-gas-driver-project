<style>
/* ================================================================
   Design Tokens — Professional Government System
   Palette: Slate + Amber accent | Typography: IBM Plex Sans Thai
   ================================================================ */
:root {
  /* brand */
  --primary:        #1e293b;
  --primary-2:      #0f172a;
  --primary-light:  #334155;
  --accent:         #f59e0b;
  --accent-2:       #d97706;

  /* surfaces */
  --bg:       #f8fafc;
  --surface:  #ffffff;
  --surface-2:#f1f5f9;
  --border:   #e2e8f0;
  --border-2: #cbd5e1;

  /* text */
  --text:     #0f172a;
  --text-2:   #475569;
  --text-3:   #94a3b8;

  /* semantic */
  --success:  #10b981;
  --warn:     #f59e0b;
  --danger:   #ef4444;
  --info:     #3b82f6;
  --purple:   #8b5cf6;

  /* sizing */
  --radius:    10px;
  --radius-lg: 14px;
  --shadow-sm: 0 1px 2px rgba(15,23,42,.06);
  --shadow:    0 4px 12px rgba(15,23,42,.08);
  --shadow-lg: 0 12px 32px rgba(15,23,42,.12);

  --sidebar-w: 260px;

  /* Theme accent — overridden per [data-theme] on <html> */
  --theme-accent:      #10b981;
  --theme-accent-2:    #059669;
  --theme-accent-soft: rgba(16,185,129,.12);
  --theme-glow:        rgba(16,185,129,.35);
  --theme-grad:        linear-gradient(135deg, #10b981 0%, #059669 60%, #047857 100%);

  font-family: 'IBM Plex Sans Thai', 'Sarabun', system-ui, sans-serif;
}
html[data-theme="emerald"]  { --theme-accent:#10b981; --theme-accent-2:#059669; --theme-accent-soft:rgba(16,185,129,.12); --theme-glow:rgba(16,185,129,.35); --theme-grad:linear-gradient(135deg,#10b981 0%, #059669 60%, #047857 100%); }
html[data-theme="sapphire"] { --theme-accent:#3b82f6; --theme-accent-2:#2563eb; --theme-accent-soft:rgba(59,130,246,.12); --theme-glow:rgba(59,130,246,.35); --theme-grad:linear-gradient(135deg,#60a5fa 0%, #3b82f6 55%, #1d4ed8 100%); }
html[data-theme="ruby"]     { --theme-accent:#ef4444; --theme-accent-2:#dc2626; --theme-accent-soft:rgba(239,68,68,.12);  --theme-glow:rgba(239,68,68,.35);  --theme-grad:linear-gradient(135deg,#f87171 0%, #ef4444 55%, #b91c1c 100%); }
html[data-theme="amber"]    { --theme-accent:#f59e0b; --theme-accent-2:#d97706; --theme-accent-soft:rgba(245,158,11,.12); --theme-glow:rgba(245,158,11,.35); --theme-grad:linear-gradient(135deg,#fbbf24 0%, #f59e0b 55%, #b45309 100%); }
html[data-theme="slate"]    { --theme-accent:#475569; --theme-accent-2:#334155; --theme-accent-soft:rgba(71,85,105,.12);  --theme-glow:rgba(71,85,105,.35);  --theme-grad:linear-gradient(135deg,#64748b 0%, #475569 55%, #1e293b 100%); }

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); }
body { font-size: 14px; line-height: 1.55; -webkit-font-smoothing: antialiased; }
[hidden] { display: none !important; }

/* Font Awesome helper — consistent sizing & inline alignment */
.ic, .fa-solid, .fa-regular, .fa-brands { line-height: 1; vertical-align: -2px; }
.ic { display: inline-block; }

h1,h2,h3,h4 { margin: 0; font-weight: 600; color: var(--text); }
a { color: var(--info); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ================================================================
   LOGIN — Premium Split Layout (Hero + Form)
   ================================================================ */
.login-screen {
  min-height: 100vh;
  position: relative;
  overflow: hidden;
  background: linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
}

/* ---- Decorative background layers ---- */
.login-bg { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
.login-bg-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(16,185,129,.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(16,185,129,.06) 1px, transparent 1px);
  background-size: 48px 48px;
  mask-image: radial-gradient(ellipse at 50% 30%, black 30%, transparent 75%);
  -webkit-mask-image: radial-gradient(ellipse at 50% 30%, black 30%, transparent 75%);
}
.login-blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(60px);
  opacity: .55;
  animation: loginBlobFloat 18s ease-in-out infinite;
}
.login-blob-1 { width: 420px; height: 420px; top: -120px; left: -100px; background: radial-gradient(circle, #34d399, #10b981 60%, transparent 70%); animation-delay: 0s; }
.login-blob-2 { width: 520px; height: 520px; bottom: -180px; right: -160px; background: radial-gradient(circle, #22d3ee, #0ea5e9 60%, transparent 70%); animation-delay: -6s; opacity: .4; }
.login-blob-3 { width: 320px; height: 320px; top: 40%; right: 12%; background: radial-gradient(circle, #fbbf24, #f59e0b 60%, transparent 70%); animation-delay: -12s; opacity: .35; }
@keyframes loginBlobFloat {
  0%,100% { transform: translate(0, 0) scale(1); }
  33%     { transform: translate(40px, 30px) scale(1.05); }
  66%     { transform: translate(-30px, 50px) scale(.96); }
}
.login-shine {
  position: absolute;
  top: -20%; left: -20%;
  width: 140%; height: 140%;
  background: conic-gradient(from 0deg,
    transparent 0deg,
    rgba(16,185,129,.05) 40deg,
    transparent 80deg,
    transparent 360deg);
  animation: loginShine 28s linear infinite;
}
@keyframes loginShine { to { transform: rotate(360deg); } }

/* ---- Split layout ---- */
.login-split {
  position: relative;
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1.05fr 1fr;
  gap: 0;
  max-width: 1400px;
  margin: 0 auto;
  padding: 24px;
  align-items: stretch;
}

/* ===== HERO side ===== */
.login-hero {
  position: relative;
  padding: 40px 44px;
  border-radius: 24px;
  background: linear-gradient(135deg, #10b981 0%, #059669 50%, #047857 100%);
  color: #fff;
  box-shadow: 0 20px 60px -20px rgba(16,185,129,.5), 0 8px 20px rgba(0,0,0,.08);
  overflow: hidden;
  display: flex; flex-direction: column; justify-content: space-between;
  min-height: min(720px, calc(100vh - 48px));
}
.login-hero::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(circle at 20% 15%, rgba(255,255,255,.25), transparent 45%),
    radial-gradient(circle at 85% 85%, rgba(255,255,255,.12), transparent 50%);
  pointer-events: none;
}
.login-hero::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(115deg, transparent 30%, rgba(255,255,255,.08) 50%, transparent 70%);
  animation: heroShimmer 8s ease-in-out infinite;
  pointer-events: none;
}
.login-hero-top { position: relative; }
.login-brand-big { display: flex; gap: 14px; align-items: center; }
.login-brand-mark-big {
  width: 60px; height: 60px;
  display: grid; place-items: center;
  font-size: 32px;
  background: rgba(255,255,255,.22);
  backdrop-filter: blur(10px);
  border: 1.5px solid rgba(255,255,255,.35);
  border-radius: 16px;
  box-shadow: 0 8px 18px rgba(0,0,0,.18);
}
.login-brand-sys-big { font-size: 20px; font-weight: 700; color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,.12); }
.login-brand-org-big { font-size: 12.5px; color: rgba(255,255,255,.82); margin-top: 2px; letter-spacing: .03em; }

.login-hero-middle { position: relative; margin: 32px 0; }
.login-hero-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 12px;
  background: rgba(255,255,255,.18);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,.3);
  border-radius: 999px;
  font-size: 11.5px; font-weight: 600; letter-spacing: .03em;
  color: #fff;
  margin-bottom: 18px;
}
.login-hero-headline {
  font-size: 34px;
  font-weight: 800;
  line-height: 1.2;
  color: #fff;
  letter-spacing: -.01em;
  text-shadow: 0 2px 10px rgba(0,0,0,.15);
  margin: 0;
}
.login-hero-accent {
  background: linear-gradient(90deg, #fef3c7, #fde68a, #fcd34d);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  font-weight: 800;
}
.login-hero-desc {
  font-size: 14.5px;
  color: rgba(255,255,255,.92);
  margin: 14px 0 0;
  line-height: 1.7;
  max-width: 460px;
}

.login-hero-features {
  position: relative;
  list-style: none; padding: 0; margin: 0;
  display: flex; flex-direction: column; gap: 12px;
}
.login-hero-features li {
  display: flex; gap: 14px; align-items: center;
  padding: 14px 16px;
  background: rgba(255,255,255,.1);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,.18);
  border-radius: 14px;
  transition: transform .2s, background .2s, border-color .2s;
  animation: featIn .55s cubic-bezier(.4,0,.2,1) backwards;
}
.login-hero-features li:nth-child(1) { animation-delay: .1s; }
.login-hero-features li:nth-child(2) { animation-delay: .2s; }
.login-hero-features li:nth-child(3) { animation-delay: .3s; }
.login-hero-features li:nth-child(4) { animation-delay: .4s; }
@keyframes featIn {
  from { opacity: 0; transform: translateX(-20px); }
  to   { opacity: 1; transform: translateX(0); }
}
.login-hero-features li:hover {
  background: rgba(255,255,255,.18);
  border-color: rgba(255,255,255,.28);
  transform: translateX(4px);
}
.feat-ico {
  flex-shrink: 0;
  width: 60px; height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 15px;
  color: #fff;
  box-shadow:
    0 8px 18px rgba(0,0,0,.26),
    inset 0 1px 0 rgba(255,255,255,.4),
    inset 0 -2px 0 rgba(0,0,0,.14);
}
.feat-ico i {
  width: 100%;
  height: 100%;
  display: flex !important;
  align-items: center !important;
  justify-content: center !important;
  font-size: 32px !important;
  line-height: 1 !important;
  vertical-align: middle !important;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,.3));
  color: #fff;
}
.login-hero-features li > div { min-width: 0; flex: 1; }
.login-hero-features li strong {
  display: block;
  font-size: 14.5px; font-weight: 700;
  color: #fff;
  letter-spacing: .005em;
  line-height: 1.25;
}
.login-hero-features li span {
  display: block;
  font-size: 12px;
  color: rgba(255,255,255,.8);
  margin-top: 3px;
  line-height: 1.4;
}

@media (max-width: 980px) {
  .login-hero-features li { padding: 11px 14px; gap: 12px; }
  .feat-ico { width: 52px; height: 52px; border-radius: 13px; }
  .feat-ico i { font-size: 26px !important; line-height: 1 !important; }
  .login-hero-features li strong { font-size: 13.5px; }
  .login-hero-features li span { font-size: 11.5px; }
}

.login-hero-stats {
  position: relative;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  padding-top: 20px;
  margin-top: 28px;
  border-top: 1px solid rgba(255,255,255,.18);
}
.login-stat { text-align: center; }
.login-stat-num {
  font-size: 26px; font-weight: 800;
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  color: #fff;
  letter-spacing: -.01em;
  font-variant-numeric: tabular-nums;
  text-shadow: 0 2px 8px rgba(0,0,0,.15);
}
.login-stat-lb { font-size: 11px; color: rgba(255,255,255,.82); margin-top: 2px; letter-spacing: .04em; text-transform: uppercase; }

/* ===== FORM side ===== */
.login-panel {
  position: relative;
  display: flex; flex-direction: column; justify-content: center;
  padding: 24px 44px;
  gap: 16px;
}
.login-card {
  position: relative;
  width: 100%;
  max-width: 460px;
  margin: 0 auto;
  padding: 32px 32px 24px;
  background: rgba(255,255,255,.86);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,.9);
  border-radius: 20px;
  box-shadow:
    0 20px 50px -20px rgba(15,23,42,.2),
    0 2px 8px rgba(15,23,42,.05),
    inset 0 1px 0 rgba(255,255,255,.8);
  animation: loginCardIn .6s cubic-bezier(.4,0,.2,1) both;
}
@keyframes loginCardIn {
  from { opacity: 0; transform: translateY(20px) scale(.98); }
  to   { opacity: 1; transform: translateY(0)   scale(1); }
}

.login-card-head { display: flex; gap: 14px; align-items: flex-start; margin-bottom: 22px; }
.login-brand-mark-sm {
  width: 44px; height: 44px; flex-shrink: 0;
  display: grid; place-items: center;
  background: linear-gradient(135deg, #34d399, #059669);
  color: #fff;
  border-radius: 12px;
  font-size: 22px;
  box-shadow: 0 6px 14px rgba(16,185,129,.35);
}
.login-welcome {
  font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -.01em;
  margin: 0;
}
.login-wave {
  display: inline-block;
  animation: wave 2.4s ease-in-out infinite;
  transform-origin: 70% 70%;
}
@keyframes wave {
  0%,60%,100% { transform: rotate(0); }
  10%,30%     { transform: rotate(14deg); }
  20%         { transform: rotate(-8deg); }
  40%         { transform: rotate(10deg); }
  50%         { transform: rotate(-4deg); }
}
.login-welcome-sub { font-size: 13px; color: var(--text-2); margin: 4px 0 0; }

/* Fields */
.login-form { display: flex; flex-direction: column; gap: 14px; }
.login-field { display: flex; flex-direction: column; gap: 6px; }
.login-field-label { font-size: 12.5px; font-weight: 600; color: var(--text-2); }
.login-input-wrap {
  position: relative;
  display: flex; align-items: center;
}
.login-input-ico {
  position: absolute; left: 14px;
  font-size: 16px;
  pointer-events: none;
  opacity: .7;
}
.login-input {
  flex: 1;
  padding: 12px 14px 12px 42px;
  font-size: 14px;
  font-family: inherit;
  background: rgba(255,255,255,.7);
  border: 1.5px solid var(--border);
  border-radius: 11px;
  color: var(--text);
  transition: border-color .15s, box-shadow .15s, background .15s;
}
.login-input::placeholder { color: var(--text-3); }
.login-input:hover { background: #fff; border-color: var(--border-2); }
.login-input:focus {
  outline: none;
  background: #fff;
  border-color: #10b981;
  box-shadow: 0 0 0 4px rgba(16,185,129,.12);
}
.login-input:focus + .login-input-ico,
.login-input-wrap:focus-within .login-input-ico { opacity: 1; }
.login-pass-toggle {
  position: absolute; right: 8px;
  background: transparent; border: none;
  padding: 6px 10px;
  cursor: pointer;
  font-size: 16px;
  color: var(--text-2);
  border-radius: 8px;
  transition: background .12s, color .12s;
}
.login-pass-toggle:hover { background: var(--surface-2); color: var(--text); }
.login-pass-toggle.is-visible .eye-icon { filter: grayscale(0); }
.login-capslock {
  font-size: 11.5px; color: #b45309;
  background: #fef3c7;
  padding: 5px 10px;
  border-radius: 8px;
  border: 1px solid #fde68a;
  animation: shake .3s;
}
@keyframes shake {
  10%, 90% { transform: translateX(-1px); }
  20%, 80% { transform: translateX(2px); }
  30%, 70% { transform: translateX(-3px); }
  40%, 60% { transform: translateX(3px); }
  50%      { transform: translateX(0); }
}

.login-row-meta { display: flex; justify-content: space-between; align-items: center; margin: 2px 0; }
.login-checkbox { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; font-size: 13px; color: var(--text-2); user-select: none; }
.login-checkbox input { position: absolute; opacity: 0; width: 0; height: 0; }
.login-checkbox-mark {
  width: 18px; height: 18px;
  background: #fff;
  border: 1.5px solid var(--border-2);
  border-radius: 5px;
  display: inline-grid; place-items: center;
  transition: all .15s;
  position: relative;
}
.login-checkbox-mark::after {
  content: '';
  width: 10px; height: 10px;
  background: linear-gradient(135deg, #34d399, #059669);
  border-radius: 2px;
  transform: scale(0);
  transition: transform .18s cubic-bezier(.4,0,.2,1);
}
.login-checkbox input:checked + .login-checkbox-mark { border-color: #10b981; }
.login-checkbox input:checked + .login-checkbox-mark::after { transform: scale(1); }
.login-forgot {
  background: transparent; border: none;
  font-size: 12.5px; color: #059669; font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  padding: 2px 6px;
  border-radius: 6px;
  transition: background .12s;
}
.login-forgot:hover { background: rgba(16,185,129,.08); text-decoration: underline; }

/* Login button (application-style with spinner) */
.btn-app-login {
  position: relative;
  padding: 13px 20px;
  font-size: 14.5px; font-weight: 600;
  color: #fff;
  background: linear-gradient(135deg, #10b981 0%, #059669 100%);
  border: none;
  border-radius: 12px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  gap: 10px;
  box-shadow: 0 10px 24px -10px rgba(16,185,129,.7), inset 0 1px 0 rgba(255,255,255,.3);
  overflow: hidden;
  transition: transform .15s, box-shadow .2s, filter .15s;
  margin-top: 6px;
}
.btn-app-login::before {
  content: '';
  position: absolute;
  top: 0; left: -75%;
  width: 50%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.4), transparent);
  transform: skewX(-20deg);
}
.btn-app-login:hover { transform: translateY(-2px); box-shadow: 0 14px 32px -10px rgba(16,185,129,.9), inset 0 1px 0 rgba(255,255,255,.4); }
.btn-app-login:hover::before { animation: loginShine 1.1s ease-in-out; }
@keyframes loginShine { to { left: 130%; } }
.btn-app-login:active { transform: translateY(0); filter: brightness(.96); }
.btn-app-login:disabled { cursor: wait; opacity: .85; }
.btn-app-login-arrow { font-size: 16px; transition: transform .15s; }
.btn-app-login:hover .btn-app-login-arrow { transform: translateX(3px); }
.btn-app-login-spinner {
  display: none;
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,.35);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
.btn-app-login.is-loading .btn-app-login-spinner { display: inline-block; }
.btn-app-login.is-loading .btn-app-login-arrow { display: none; }
.btn-app-login.is-loading .btn-app-login-text { opacity: .9; }

/* Error */
.login-error {
  background: #fef2f2;
  border: 1px solid #fecaca;
  color: #991b1b;
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 13px;
  display: flex; align-items: center; gap: 8px;
  animation: shake .3s;
}
.login-error::before {
  content: '\f071';
  font-family: 'Font Awesome 6 Free';
  font-weight: 900;
  font-size: 14px;
}

/* Divider */
.login-divider {
  display: flex; align-items: center; gap: 12px;
  margin: 22px 0 14px;
  color: var(--text-3);
  font-size: 11.5px; font-weight: 500;
  letter-spacing: .04em;
}
.login-divider::before,
.login-divider::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, var(--border), transparent);
}
.login-divider span { white-space: nowrap; }

/* Demo account chips */
.login-hint-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
  gap: 8px;
}
.login-chip {
  display: flex; align-items: center; justify-content: center;
  gap: 6px;
  padding: 9px 10px;
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-size: 12px; font-weight: 600;
  color: var(--text-2);
  cursor: pointer;
  font-family: inherit;
  transition: transform .12s, border-color .15s, background .15s, color .15s, box-shadow .15s;
}
.login-chip:hover { transform: translateY(-2px); box-shadow: 0 6px 14px rgba(15,23,42,.08); }
.login-chip-ico { font-size: 14px; }
.login-chip[data-role="super_admin"]:hover { background: #fef2f2; border-color: #fca5a5; color: #b91c1c; }
.login-chip[data-role="div_admin"]:hover   { background: #fff7ed; border-color: #fdba74; color: #c2410c; }
.login-chip[data-role="director"]:hover    { background: #f5f3ff; border-color: #c4b5fd; color: #6d28d9; }
.login-chip[data-role="deputy"]:hover      { background: #eff6ff; border-color: #93c5fd; color: #1d4ed8; }
.login-chip[data-role="mayor"]:hover       { background: #f0fdfa; border-color: #5eead4; color: #0f766e; }
.login-chip[data-role="driver"]:hover      { background: #fffbeb; border-color: #fcd34d; color: #b45309; }
.login-chip[data-role="requester"]:hover   { background: #ecfdf5; border-color: #6ee7b7; color: #047857; }

/* Legal footer */
.login-legal {
  display: flex; justify-content: center; align-items: center;
  gap: 8px;
  font-size: 11.5px; color: var(--text-3);
  padding-top: 8px;
  flex-wrap: wrap;
}
.login-legal a { color: #059669; font-weight: 500; }
.login-legal-dot { opacity: .6; }

/* ================================================================
   LOGIN — Mobile responsive (≤900px collapses hero to banner)
   ================================================================ */
@media (max-width: 980px) {
  .login-split {
    grid-template-columns: 1fr;
    padding: 16px;
    align-items: start;
  }
  .login-hero {
    padding: 24px 22px;
    min-height: auto;
    border-radius: 20px;
  }
  .login-hero-headline { font-size: 24px; }
  .login-hero-desc { font-size: 13.5px; }
  .login-hero-features { gap: 8px; }
  .login-hero-features li { padding: 9px 12px; }
  .login-hero-features li strong { font-size: 13px; }
  .login-hero-features li span { font-size: 11px; }
  .login-panel { padding: 0; }
  .login-card { padding: 24px 22px 20px; }
  .login-brand-mark-big { width: 52px; height: 52px; font-size: 28px; }
  .login-brand-sys-big { font-size: 17px; }
}
@media (max-width: 560px) {
  .login-hero-features { display: none; } /* keep mobile banner compact */
  .login-hero-middle { margin: 16px 0; }
  .login-hero-headline { font-size: 20px; }
  .login-hero-stats { padding-top: 12px; margin-top: 14px; }
  .login-stat-num { font-size: 22px; }
  .login-welcome { font-size: 19px; }
  .login-welcome-sub { font-size: 12.5px; }
  .login-hint-grid { grid-template-columns: repeat(3, 1fr); }
}

/* ================================================================
   Fields / Buttons
   ================================================================ */
.field { display: grid; gap: 6px; }
.field-label { font-size: 12px; color: var(--text-2); font-weight: 500; }
.field-hint  { font-size: 11px; color: var(--text-3); }
.avail-status-msg { font-size: 12px; color: var(--text-2); padding: 4px 0; min-height: 18px; }
.avail-status-err { color: var(--danger, #ef4444); }

input, select, textarea {
  width: 100%;
  padding: 10px 12px;
  font-size: 14px;
  font-family: inherit;
  border: 1px solid var(--border-2);
  border-radius: var(--radius);
  background: var(--surface);
  color: var(--text);
  outline: none;
  transition: border-color .15s ease, box-shadow .15s ease;
}
input:focus, select:focus, textarea:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(30,41,59,.08);
}
textarea { resize: vertical; min-height: 80px; }

.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 6px;
  padding: 9px 16px;
  border: 1px solid transparent;
  border-radius: var(--radius);
  font-family: inherit;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  background: var(--surface);
  color: var(--text);
  transition: all .15s ease;
  white-space: nowrap;
}
.btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-sm); }
.btn:active { transform: translateY(0); }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-2); }
.btn-accent  { background: var(--accent); color: #fff; }
.btn-accent:hover { background: var(--accent-2); }
.btn-success { background: var(--success); color: #fff; }
.btn-danger  { background: var(--danger);  color: #fff; }
.btn-ghost   { background: transparent; border: 1px solid var(--border-2); }
.btn-ghost:hover { background: var(--surface-2); }
.btn-block   { width: 100%; }
.btn-sm      { padding: 6px 10px; font-size: 12px; }
.btn:disabled { opacity: .55; cursor: not-allowed; transform: none; }

/* ================================================================
   App Shell
   ================================================================ */
.app-shell {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  min-height: 100vh;
}
.sidebar {
  background: linear-gradient(180deg, var(--primary), var(--primary-2));
  color: #e2e8f0;
  padding: 20px 14px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  position: sticky; top: 0;
  height: 100vh;
  overflow-y: auto;
}
.sidebar-brand {
  display: flex; gap: 12px; align-items: center;
  padding: 2px 4px 14px;
  border-bottom: 1px solid rgba(255,255,255,.08);
}
.sidebar-mark {
  width: 44px; height: 44px;
  display: grid; place-items: center;
  background: linear-gradient(135deg, rgba(245,158,11,.22), rgba(245,158,11,.08));
  color: var(--accent);
  border: 1px solid rgba(245,158,11,.25);
  border-radius: 12px;
  font-size: 22px;
  box-shadow: 0 2px 6px rgba(0,0,0,.2);
  flex-shrink: 0;
}
.sidebar-title { min-width: 0; }
.sidebar-sys {
  font-size: 14px; font-weight: 700; color: #fff;
  letter-spacing: .01em;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.sidebar-org {
  font-size: 11px; color: #94a3b8; margin-top: 2px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

/* Sidebar meta: digital clock + role badge */
.sidebar-meta {
  display: flex; gap: 10px; align-items: center;
  padding: 10px 12px;
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.06);
  border-radius: 10px;
}
.side-clock { flex: 1; min-width: 0; }
.side-clock-time {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 18px;
  font-weight: 600;
  color: #fff;
  letter-spacing: .04em;
  line-height: 1.1;
  font-variant-numeric: tabular-nums;
}
.side-clock-date {
  font-size: 11px;
  color: #94a3b8;
  margin-top: 3px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.side-role-badge {
  flex-shrink: 0;
  font-size: 11px; font-weight: 600;
  color: var(--accent);
  background: rgba(245,158,11,.12);
  border: 1px solid rgba(245,158,11,.3);
  padding: 4px 10px;
  border-radius: 999px;
  letter-spacing: .02em;
  max-width: 110px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.side-role-badge[data-role="admin"]    { color: #fca5a5; background: rgba(239,68,68,.12);  border-color: rgba(239,68,68,.35); }
.side-role-badge[data-role="manager"]  { color: #93c5fd; background: rgba(59,130,246,.12); border-color: rgba(59,130,246,.35); }
.side-role-badge[data-role="approver"] { color: #c4b5fd; background: rgba(139,92,246,.12); border-color: rgba(139,92,246,.35); }
.side-role-badge[data-role="user"]     { color: #6ee7b7; background: rgba(16,185,129,.12); border-color: rgba(16,185,129,.35); }
.side-role-badge[data-role="driver"]   { color: #fcd34d; background: rgba(245,158,11,.12); border-color: rgba(245,158,11,.35); }

.sidenav {
  flex: 1;
  display: flex; flex-direction: column; gap: 2px;
  overflow-y: auto;
  margin: 0 -4px;
  padding: 4px;
}
.sidenav::-webkit-scrollbar { width: 6px; }
.sidenav::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 3px; }
.sidenav::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.18); }

.sidenav-item {
  position: relative;
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px;
  border-radius: 8px;
  color: #cbd5e1;
  cursor: pointer;
  font-size: 13.5px;
  text-decoration: none;
  transition: background .12s ease, color .12s ease, transform .12s ease;
  user-select: none;
}
.sidenav-item:hover {
  background: rgba(255,255,255,.06);
  color: #fff;
  text-decoration: none;
}
.sidenav-item.active {
  background: linear-gradient(90deg, rgba(245,158,11,.18), rgba(245,158,11,.04));
  color: #fff;
  font-weight: 600;
}
.sidenav-item.active::before {
  content: '';
  position: absolute;
  left: -4px; top: 6px; bottom: 6px;
  width: 3px;
  background: var(--accent);
  border-radius: 0 3px 3px 0;
  box-shadow: 0 0 8px rgba(245,158,11,.55);
}
.sidenav-item.active .sidenav-icon { filter: drop-shadow(0 0 4px rgba(245,158,11,.5)); }
.sidenav-icon {
  font-size: 16px; width: 22px; text-align: center;
  flex-shrink: 0;
}
.sidenav-text {
  flex: 1; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.sidenav-badge {
  margin-left: auto;
  background: var(--accent);
  color: #fff;
  font-size: 11px;
  padding: 1px 8px;
  border-radius: 999px;
  font-weight: 600;
}
.sidenav-sep {
  height: 1px;
  background: rgba(255,255,255,.07);
  margin: 6px 10px;
}
.sidenav-label {
  font-size: 10.5px;
  color: #64748b;
  padding: 14px 12px 6px;
  letter-spacing: .12em;
  text-transform: uppercase;
  font-weight: 600;
  display: flex; align-items: center; gap: 8px;
}
.sidenav-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, rgba(255,255,255,.08), transparent);
}
.sidenav-label:first-child { padding-top: 4px; }

.sidebar-foot { border-top: 1px solid rgba(255,255,255,.08); padding-top: 12px; }
.user-chip { display: flex; gap: 10px; align-items: center; padding: 8px; margin-bottom: 8px; background: rgba(255,255,255,.05); border-radius: 8px; }
.avatar {
  width: 36px; height: 36px;
  display: grid; place-items: center;
  background: var(--accent);
  color: #fff;
  border-radius: 50%;
  font-weight: 600;
  font-size: 14px;
}
.user-name { font-size: 13px; font-weight: 600; color: #fff; }
.user-role { font-size: 11px; color: #94a3b8; }

.btn-ghost[id=logoutBtn] { background: rgba(255,255,255,.06); color: #fff; border-color: rgba(255,255,255,.1); }
.btn-ghost[id=logoutBtn]:hover { background: rgba(239,68,68,.2); border-color: rgba(239,68,68,.4); color: #fca5a5; }

/* main area */
.main { min-width: 0; display: flex; flex-direction: column; min-height: 100vh; }
.main > .page { flex: 1; }
.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  display: flex; align-items: center; gap: 16px;
  position: sticky; top: 0; z-index: 10;
}
.page-title { font-size: 18px; font-weight: 600; }
.topbar-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }
.hamburger {
  background: transparent; border: none; font-size: 20px; cursor: pointer;
  color: var(--text); display: none;
}
.page { padding: 24px; }

/* ================================================================
   Cards / Tables / Badges
   ================================================================ */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  box-shadow: var(--shadow-sm);
}
.card + .card { margin-top: 16px; }
.card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; gap: 10px; flex-wrap: wrap; }
.card-title { font-size: 15px; font-weight: 600; }
.card-sub { font-size: 12px; color: var(--text-3); margin-top: 2px; }

.table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
.table th, .table td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); vertical-align: middle; }
.table th { font-weight: 600; font-size: 12px; color: var(--text-2); background: var(--surface-2); text-transform: uppercase; letter-spacing: .03em; }
.table tr:hover td { background: var(--surface-2); }
.table .num { font-family: 'JetBrains Mono', monospace; font-size: 12.5px; }
.table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }

.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px;
  border-radius: 999px;
  font-size: 11.5px;
  font-weight: 500;
}

.stat-grid {
  display: grid; gap: 16px;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  margin-bottom: 20px;
}
.stat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px;
  box-shadow: var(--shadow-sm);
  position: relative;
  overflow: hidden;
}
.stat::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent);
}
.stat-label { font-size: 12px; color: var(--text-3); text-transform: uppercase; letter-spacing: .05em; }
.stat-value { font-size: 28px; font-weight: 700; color: var(--text); margin-top: 6px; font-family: 'JetBrains Mono', monospace; }
.stat-sub { font-size: 12px; color: var(--text-2); margin-top: 4px; }
.stat.success::before { background: var(--success); }
.stat.warn::before    { background: var(--warn); }
.stat.danger::before  { background: var(--danger); }
.stat.info::before    { background: var(--info); }

/* Dashboard stat cards (Views.dashboard) */
.stats-grid {
  display: grid; gap: 16px;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  margin-bottom: 20px;
}
.stat-card {
  display: flex; align-items: center; gap: 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px 18px;
  box-shadow: var(--shadow-sm);
}
.stat-card .stat-icon {
  flex: 0 0 auto;
  width: 44px; height: 44px;
  display: grid; place-items: center;
  border-radius: 12px;
  font-size: 20px;
  color: #fff;
}
.stat-card .stat-body { min-width: 0; }
.stat-card .stat-value { margin-top: 0; line-height: 1.1; }
.stat-card .stat-label { margin-top: 2px; }

.toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
.toolbar .spacer { flex: 1; }
.search-input { min-width: 240px; }

/* ================================================================
   Forms grid
   ================================================================ */
.form-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px 16px;
}
.form-grid .col-2 { grid-column: span 2; }
@media (max-width: 640px) {
  .form-grid { grid-template-columns: 1fr; }
  .form-grid .col-2 { grid-column: span 1; }
}

/* ================================================================
   Modal — Premium glass + header accent + smooth motion
   ================================================================ */
.modal {
  position: fixed; inset: 0; z-index: 1000;
  display: grid; place-items: center;
  padding: 20px;
  animation: modalFadeIn .18s cubic-bezier(.4,0,.2,1) both;
}
@keyframes modalFadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal-backdrop {
  position: absolute; inset: 0;
  background:
    radial-gradient(circle at 50% 50%, rgba(15,23,42,.4), rgba(15,23,42,.65)),
    rgba(15,23,42,.2);
  backdrop-filter: blur(8px) saturate(1.1);
  -webkit-backdrop-filter: blur(8px) saturate(1.1);
}
.modal-card {
  position: relative;
  background: #fff;
  border-radius: 18px;
  max-width: 640px;
  width: 100%;
  max-height: 92vh;
  overflow: hidden;
  display: flex; flex-direction: column;
  box-shadow:
    0 24px 60px -18px rgba(15,23,42,.35),
    0 8px 22px rgba(15,23,42,.08),
    inset 0 1px 0 rgba(255,255,255,.9),
    0 0 0 1px var(--theme-accent-soft);
  animation: modalIn .28s cubic-bezier(.34,1.56,.64,1) both;
}
.modal-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: var(--theme-grad);
  pointer-events: none;
}
.modal-card.lg { max-width: 860px; }
.modal-card.xl { max-width: 1040px; }
@keyframes modalIn {
  from { opacity: 0; transform: translateY(22px) scale(.94); }
  to   { opacity: 1; transform: translateY(0)   scale(1); }
}
.modal-head {
  padding: 20px 24px 18px;
  border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  background: linear-gradient(180deg, var(--surface), var(--surface-2));
}
.modal-head h3 {
  font-size: 17px; font-weight: 700;
  color: var(--text);
  display: inline-flex; align-items: center; gap: 10px;
}
.modal-head h3 i {
  color: var(--theme-accent-2);
  font-size: 15px;
  padding: 8px;
  background: var(--theme-accent-soft);
  border-radius: 9px;
}
.modal-close {
  width: 32px; height: 32px;
  background: transparent; border: none;
  font-size: 15px; cursor: pointer;
  color: var(--text-3);
  border-radius: 8px;
  transition: background .12s, color .12s, transform .12s;
}
.modal-close:hover { background: var(--surface-2); color: var(--danger); transform: rotate(90deg); }
.modal-body {
  padding: 22px 24px;
  overflow-y: auto;
}
.modal-body::-webkit-scrollbar { width: 8px; }
.modal-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.modal-body::-webkit-scrollbar-thumb:hover { background: var(--border-2); }
.modal-foot {
  padding: 14px 24px;
  border-top: 1px solid var(--border);
  display: flex; gap: 10px; justify-content: flex-end;
  background: var(--surface-2);
}
.modal-foot .btn {
  padding: 9px 18px;
  font-weight: 600;
  font-size: 13.5px;
  border-radius: 10px;
}
.modal-foot .btn-primary {
  background: linear-gradient(135deg, var(--theme-accent), var(--theme-accent-2));
  border: none; color: #fff;
  box-shadow: 0 6px 16px -4px var(--theme-glow);
  transition: transform .12s, box-shadow .15s;
}
.modal-foot .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 10px 22px -4px var(--theme-glow); }

/* ================================================================
   Professional form — section + icons + refined inputs
   ================================================================ */
.form-section {
  margin-bottom: 18px;
  padding-bottom: 18px;
  border-bottom: 1px dashed var(--border);
}
.form-section:last-of-type { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
.form-section-title {
  display: flex; align-items: center; gap: 9px;
  font-size: 13px;
  font-weight: 700;
  color: var(--theme-accent-2);
  text-transform: uppercase;
  letter-spacing: .05em;
  margin-bottom: 14px;
}
.form-section-title i {
  width: 28px; height: 28px;
  display: grid; place-items: center;
  background: var(--theme-accent-soft);
  border-radius: 8px;
  font-size: 13px;
}

/* Upgrade inputs inside modal */
.modal-body input[type="text"],
.modal-body input[type="number"],
.modal-body input[type="date"],
.modal-body input[type="time"],
.modal-body input[type="email"],
.modal-body input[type="password"],
.modal-body textarea,
.modal-body select {
  padding: 10px 12px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-size: 13.5px;
  font-family: inherit;
  background: var(--surface);
  color: var(--text);
  transition: border-color .12s, box-shadow .12s, background .12s;
  width: 100%;
}
.modal-body input:hover,
.modal-body select:hover,
.modal-body textarea:hover { border-color: var(--border-2); }
.modal-body input:focus,
.modal-body select:focus,
.modal-body textarea:focus {
  outline: none;
  border-color: var(--theme-accent);
  box-shadow: 0 0 0 3px var(--theme-accent-soft);
  background: #fff;
}
.modal-body input:disabled,
.modal-body select:disabled,
.modal-body textarea:disabled {
  background: var(--surface-2);
  color: var(--text-3);
  cursor: not-allowed;
}
.modal-body textarea { resize: vertical; min-height: 68px; }
.modal-body .field-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-2);
  display: flex; align-items: center; gap: 5px;
  margin-bottom: 5px;
}
.modal-body .field-label i {
  color: var(--text-3);
  font-size: 11px;
}

/* Row action buttons (list tables) */
.actions { display: flex; gap: 6px; justify-content: flex-end; }
.actions .btn-sm {
  padding: 6px 10px;
  font-size: 12px;
  border-radius: 8px;
  display: inline-flex; align-items: center; gap: 5px;
  transition: transform .12s, box-shadow .12s;
}
.actions .btn-sm:hover { transform: translateY(-1px); box-shadow: 0 4px 10px rgba(15,23,42,.08); }
.actions .btn-ghost {
  background: var(--surface-2);
  color: var(--text);
  border: 1px solid var(--border);
}
.actions .btn-ghost:hover { background: var(--theme-accent-soft); color: var(--theme-accent-2); border-color: var(--theme-accent); }

/* Mobile — modal full screen on small */
@media (max-width: 560px) {
  .modal { padding: 0; }
  .modal-card { border-radius: 0; max-width: 100%; max-height: 100vh; height: 100vh; }
  .modal-card::before { border-radius: 0; }
  .modal-head { padding: 14px 18px; }
  .modal-body { padding: 18px; }
  .modal-foot { padding: 12px 18px; }
  .modal-foot .btn { flex: 1; justify-content: center; }
}

/* ================================================================
   Toast
   ================================================================ */
.toasts {
  position: fixed; top: 20px; right: 20px;
  display: flex; flex-direction: column; gap: 8px;
  z-index: 100;
}
.toast {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 4px solid var(--info);
  border-radius: var(--radius);
  padding: 10px 14px;
  box-shadow: var(--shadow);
  min-width: 280px;
  font-size: 13px;
  animation: toastIn .2s ease;
}
.toast.success { border-left-color: var(--success); }
.toast.error   { border-left-color: var(--danger); }
.toast.warn    { border-left-color: var(--warn); }
@keyframes toastIn {
  from { transform: translateX(120%); opacity: 0; }
  to   { transform: translateX(0);    opacity: 1; }
}

/* ================================================================
   Loader — Premium Status (multi-ring orbit + status text + shimmer)
   ================================================================ */
.loader {
  position: fixed; inset: 0;
  z-index: 2000;
  display: grid; place-items: center;
  padding: 24px;
  animation: loaderFadeIn .18s cubic-bezier(.4,0,.2,1) both;
}
.loader.is-hiding { animation: loaderFadeOut .2s cubic-bezier(.4,0,.2,1) forwards; }
@keyframes loaderFadeIn  { from { opacity: 0; } to { opacity: 1; } }
@keyframes loaderFadeOut { from { opacity: 1; } to { opacity: 0; } }

.loader-backdrop {
  position: absolute; inset: 0;
  background:
    radial-gradient(circle at 50% 40%, rgba(15,23,42,.28), rgba(15,23,42,.55)),
    rgba(15,23,42,.18);
  backdrop-filter: blur(10px) saturate(1.1);
  -webkit-backdrop-filter: blur(10px) saturate(1.1);
}

.loader-card {
  position: relative;
  display: flex; flex-direction: column; align-items: center;
  gap: 18px;
  padding: 28px 36px 22px;
  min-width: 280px;
  max-width: 90vw;
  background: rgba(255,255,255,.9);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,.9);
  border-radius: 22px;
  box-shadow:
    0 24px 60px -15px rgba(15,23,42,.35),
    0 8px 20px rgba(15,23,42,.1),
    inset 0 1px 0 rgba(255,255,255,.9),
    0 0 0 1px var(--theme-accent-soft);
  animation: loaderCardIn .3s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes loaderCardIn {
  from { opacity: 0; transform: translateY(12px) scale(.92); }
  to   { opacity: 1; transform: translateY(0)   scale(1); }
}

/* ----- Orbit rings ----- */
.loader-anim {
  position: relative;
  width: 90px; height: 90px;
  display: grid; place-items: center;
}
.loader-ring {
  position: absolute;
  border-radius: 50%;
  border-style: solid;
  border-color: transparent;
}
.loader-ring-1 {
  width: 90px; height: 90px;
  border-width: 3px;
  border-top-color: var(--theme-accent);
  border-right-color: var(--theme-accent);
  animation: spin 1.4s cubic-bezier(.5,.1,.5,.9) infinite;
  filter: drop-shadow(0 0 6px var(--theme-glow));
}
.loader-ring-2 {
  width: 66px; height: 66px;
  border-width: 2.5px;
  border-bottom-color: var(--theme-accent-2);
  border-left-color: var(--theme-accent-2);
  opacity: .85;
  animation: spinReverse 1.1s cubic-bezier(.5,.1,.5,.9) infinite;
}
.loader-ring-3 {
  width: 42px; height: 42px;
  border-width: 2px;
  border-top-color: rgba(15,23,42,.45);
  border-right-color: rgba(15,23,42,.15);
  animation: spin .9s linear infinite;
}
@keyframes spin        { to { transform: rotate(360deg); } }
@keyframes spinReverse { to { transform: rotate(-360deg); } }

.loader-core {
  position: relative;
  width: 30px; height: 30px;
  display: grid; place-items: center;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--theme-accent), var(--theme-accent-2));
  box-shadow:
    0 0 0 3px #fff,
    0 6px 14px var(--theme-glow),
    inset 0 1px 0 rgba(255,255,255,.4);
  animation: loaderCorePulse 1.6s ease-in-out infinite;
}
@keyframes loaderCorePulse {
  0%,100% { transform: scale(1);   box-shadow: 0 0 0 3px #fff, 0 6px 14px var(--theme-glow), 0 0 0 0 var(--theme-glow); }
  50%     { transform: scale(1.08); box-shadow: 0 0 0 3px #fff, 0 8px 18px var(--theme-glow), 0 0 0 8px transparent; }
}
.loader-core-icon {
  font-size: 14px;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,.25));
}

/* ----- Status text ----- */
.loader-text {
  text-align: center;
  min-width: 220px;
  max-width: 360px;
}
.loader-msg {
  font-size: 14.5px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: .01em;
  display: inline-flex; align-items: center; justify-content: center;
  gap: 2px;
}
.loader-dots {
  display: inline-block;
  width: 16px; text-align: left;
  font-family: 'JetBrains Mono', ui-monospace, monospace;
}
.loader-dots::after {
  content: '';
  display: inline-block;
  animation: loaderDots 1.4s steps(4,end) infinite;
}
@keyframes loaderDots {
  0%   { content: ''; }
  25%  { content: '.'; }
  50%  { content: '..'; }
  75%  { content: '...'; }
  100% { content: ''; }
}
.loader-sub {
  font-size: 12.5px;
  color: var(--text-3);
  margin-top: 4px;
  font-weight: 500;
}

/* ----- Indeterminate progress bar ----- */
.loader-progress {
  position: relative;
  width: 100%;
  height: 4px;
  background: var(--surface-2);
  border-radius: 999px;
  overflow: hidden;
  box-shadow: inset 0 1px 2px rgba(0,0,0,.06);
}
.loader-progress-bar {
  position: absolute;
  top: 0; left: -40%;
  width: 40%; height: 100%;
  border-radius: 999px;
  background: linear-gradient(90deg, transparent, var(--theme-accent) 30%, var(--theme-accent-2) 70%, transparent);
  animation: loaderProgress 1.4s cubic-bezier(.45,.05,.55,.95) infinite;
  box-shadow: 0 0 8px var(--theme-glow);
}
@keyframes loaderProgress {
  0%   { left: -40%; }
  100% { left: 110%; }
}

/* Mobile */
@media (max-width: 480px) {
  .loader-card { padding: 22px 24px 18px; min-width: 240px; }
  .loader-anim { width: 76px; height: 76px; }
  .loader-ring-1 { width: 76px; height: 76px; }
  .loader-ring-2 { width: 56px; height: 56px; }
  .loader-ring-3 { width: 36px; height: 36px; }
  .loader-msg { font-size: 13.5px; }
  .loader-sub { font-size: 11.5px; }
}

/* ================================================================
   CALENDAR — Premium redesign (month grid + list + filters + print)
   ================================================================ */
.cal-page { display: flex; flex-direction: column; gap: 18px; }
.hide-sm { display: inline; }

/* ---- Hero ---- */
.cal-hero {
  position: relative;
  overflow: hidden;
  border-radius: 20px;
  padding: 24px 28px;
  color: #fff;
  background: var(--theme-grad);
  box-shadow: 0 14px 40px -12px var(--theme-glow), 0 4px 14px rgba(15,23,42,.08);
}
.cal-hero-decor {
  position: absolute; inset: 0;
  background:
    radial-gradient(circle at 18% 20%, rgba(255,255,255,.25), transparent 45%),
    radial-gradient(circle at 82% 85%, rgba(255,255,255,.14), transparent 50%),
    linear-gradient(110deg, transparent 35%, rgba(255,255,255,.08) 50%, transparent 65%);
  pointer-events: none;
  animation: heroShimmer 6s ease-in-out infinite;
}
.cal-hero-inner {
  position: relative;
  display: flex; justify-content: space-between; align-items: center;
  gap: 18px; flex-wrap: wrap;
}
.cal-hero-title { display: flex; gap: 14px; align-items: center; min-width: 0; }
.cal-hero-icon {
  width: 58px; height: 58px;
  flex-shrink: 0;
  display: grid; place-items: center;
  font-size: 26px;
  background: rgba(255,255,255,.22);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,.3);
  border-radius: 16px;
  box-shadow: 0 8px 18px rgba(0,0,0,.15);
}
.cal-hero-h {
  font-size: 22px; font-weight: 700;
  color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,.15);
  margin: 0;
}
.cal-hero-sub {
  font-size: 13px;
  color: rgba(255,255,255,.88);
  margin-top: 3px;
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
}
.cal-hero-sub strong { color: #fff; }
.cal-hero-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 10px;
  background: rgba(255,255,255,.18);
  border: 1px solid rgba(255,255,255,.3);
  border-radius: 999px;
  font-size: 11px; font-weight: 600;
  backdrop-filter: blur(6px);
}
.cal-hero-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.cal-hero-actions .cal-nav {
  display: inline-flex;
  background: rgba(255,255,255,.16);
  border: 1px solid rgba(255,255,255,.28);
  border-radius: 10px;
  padding: 3px;
  gap: 2px;
  backdrop-filter: blur(6px);
}
.cal-hero-actions .cal-nav .btn-app-ghost {
  background: transparent;
  border: none;
  padding: 6px 12px;
  backdrop-filter: none;
}
.cal-hero-actions .cal-nav .btn-app-ghost:hover { background: rgba(255,255,255,.22); }

/* ---- Toolbar ---- */
.cal-toolbar {
  display: flex; justify-content: space-between; align-items: center;
  gap: 16px; flex-wrap: wrap;
  padding: 14px 18px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  box-shadow: var(--shadow-sm);
}
.cal-jump { display: flex; gap: 10px; flex-wrap: wrap; }
.cal-jump-field { display: flex; flex-direction: column; gap: 4px; }
.cal-jump-field > span {
  font-size: 11px; color: var(--text-3); font-weight: 600; letter-spacing: .02em;
}
.cal-select {
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 9px;
  font-size: 13.5px;
  font-family: inherit;
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  min-width: 140px;
  transition: border-color .12s, box-shadow .12s;
}
.cal-select:focus { outline: none; border-color: var(--theme-accent); box-shadow: 0 0 0 3px var(--theme-accent-soft); }

.cal-view-switch {
  display: inline-flex;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 3px;
  gap: 2px;
}
.cal-view-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 14px;
  background: transparent;
  border: none;
  color: var(--text-2);
  font-size: 13px; font-weight: 500;
  font-family: inherit;
  border-radius: 8px;
  cursor: pointer;
  transition: background .12s, color .12s, box-shadow .15s;
}
.cal-view-btn:hover { color: var(--text); }
.cal-view-btn.active {
  background: var(--surface);
  color: var(--theme-accent-2);
  font-weight: 600;
  box-shadow: 0 2px 6px rgba(15,23,42,.08), inset 0 0 0 1px var(--border);
}

/* ---- Filter chips ---- */
.cal-filter-chips {
  display: flex; gap: 8px;
  padding: 6px 2px;
  overflow-x: auto;
  scrollbar-width: thin;
}
.cal-filter-chips::-webkit-scrollbar { height: 4px; }
.cal-filter-chips::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.cal-filter-chip {
  flex-shrink: 0;
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 12px 7px 10px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 999px;
  font-size: 12.5px; font-weight: 500;
  color: var(--text-2);
  font-family: inherit;
  cursor: pointer;
  transition: all .15s;
}
.cal-filter-chip:hover { border-color: var(--border-2); color: var(--text); transform: translateY(-1px); }
.cal-filter-chip.active {
  background: var(--theme-accent);
  border-color: var(--theme-accent);
  color: #fff;
  font-weight: 600;
  box-shadow: 0 4px 12px var(--theme-glow);
}
.cal-filter-chip.active .cal-chip-dot { background: #fff !important; }
.cal-filter-chip.active .cal-chip-count { background: rgba(255,255,255,.25); color: #fff; }
.cal-chip-dot {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--chip-dot, var(--text-3));
}
.cal-chip-count {
  display: inline-block;
  padding: 1px 7px;
  background: var(--surface-2);
  color: var(--text-2);
  border-radius: 999px;
  font-size: 11px; font-weight: 600;
  font-family: 'JetBrains Mono', monospace;
  min-width: 22px; text-align: center;
}

/* ---- Stats ---- */
.cal-stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
}
.cal-stat {
  display: flex; gap: 12px; align-items: center;
  padding: 14px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  box-shadow: var(--shadow-sm);
  transition: transform .15s, box-shadow .15s;
}
.cal-stat:hover { transform: translateY(-2px); box-shadow: 0 8px 18px rgba(15,23,42,.08); }
.cal-stat-ico {
  flex-shrink: 0;
  width: 44px; height: 44px;
  display: grid; place-items: center;
  border-radius: 12px;
  font-size: 20px;
  color: #fff;
  box-shadow: 0 4px 10px rgba(0,0,0,.12), inset 0 1px 0 rgba(255,255,255,.3);
}
.cal-stat-body { min-width: 0; flex: 1; }
.cal-stat-num {
  font-size: 22px; font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  line-height: 1.1;
  font-variant-numeric: tabular-nums;
  color: var(--text);
}
.cal-stat-lb { font-size: 11.5px; color: var(--text-2); margin-top: 2px; }

.cal-stat-chart { grid-column: span 2; }
@media (max-width: 720px) { .cal-stat-chart { grid-column: span 1; } }
.cal-dow {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  align-items: end;
  height: 64px;
  padding-top: 4px;
}
.cal-dow-col {
  display: flex; flex-direction: column;
  align-items: stretch;
  height: 100%;
  gap: 2px;
}
.cal-dow-bar {
  min-height: 3px;
  border-radius: 3px 3px 0 0;
  margin-top: auto;
  opacity: .8;
  transition: opacity .15s;
}
.cal-dow-col:hover .cal-dow-bar { opacity: 1; }
.cal-dow-num {
  font-size: 10px; font-weight: 600;
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text-2);
}
.cal-dow-lb { font-size: 10px; color: var(--text-3); text-align: center; }

/* ---- Main area (grid / list) ---- */
.cal-main { min-height: 0; }

/* Month grid — override older .cal rules with richer look */
.cal-main.is-month .cal {
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  background: var(--border);
}
.cal-main.is-month .cal-head-row {
  background: var(--surface-2);
  gap: 1px;
}
.cal-main.is-month .cal-head-cell {
  background: var(--surface-2);
  padding: 10px 10px;
  font-size: 12.5px;
  font-weight: 700;
  color: var(--text-2);
  letter-spacing: .04em;
  text-transform: uppercase;
  text-align: center;
}
.cal-main.is-month .cal-head-cell.is-weekend { color: var(--theme-accent-2); }

.cal-main.is-month .cal-week { gap: 1px; background: var(--border); }
.cal-main.is-month .cal-day {
  background: var(--surface);
  min-height: 116px;
  padding: 8px;
  gap: 4px;
  position: relative;
  transition: background .15s, box-shadow .15s;
}
.cal-main.is-month .cal-day:hover { background: var(--surface-2); }
.cal-main.is-month .cal-day-out { background: #fafbfc; opacity: .55; }
.cal-main.is-month .cal-day-weekend { background: #fafbfd; }
.cal-main.is-month .cal-day-weekend.cal-day-out { background: #f5f6f8; }

.cal-day-head { display: flex; align-items: center; justify-content: space-between; gap: 4px; }
.cal-day-num { font-size: 13px; font-weight: 700; color: var(--text-2); }
.cal-day-out .cal-day-num { color: var(--text-3); }
.cal-day-count {
  display: inline-block;
  min-width: 22px;
  padding: 1px 6px;
  font-size: 10.5px; font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text-2);
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 999px;
  text-align: center;
  font-variant-numeric: tabular-nums;
}

.cal-day-today {
  background: linear-gradient(180deg, var(--theme-accent-soft), transparent 40%), var(--surface) !important;
  box-shadow: inset 0 2px 0 var(--theme-accent);
}
.cal-day-today .cal-day-num {
  color: #fff;
  background: linear-gradient(135deg, var(--theme-accent), var(--theme-accent-2));
  width: 26px; height: 26px;
  display: grid; place-items: center;
  border-radius: 50%;
  box-shadow: 0 3px 8px var(--theme-glow);
  font-weight: 800;
}
.cal-day-today-badge {
  font-size: 9.5px; font-weight: 700;
  color: var(--theme-accent-2);
  background: var(--theme-accent-soft);
  border: 1px solid var(--theme-accent);
  padding: 1px 7px;
  border-radius: 999px;
  letter-spacing: .03em;
  text-transform: uppercase;
}

/* heatmap intensity: subtle left bar based on count */
.cal-day-has::before {
  content: '';
  position: absolute; left: 0; top: 6px; bottom: 6px;
  width: 3px;
  background: var(--cal-day-accent, var(--theme-accent));
  border-radius: 0 3px 3px 0;
  opacity: .85;
}
.cal-day-heat-2 { background: linear-gradient(90deg, rgba(16,185,129,.04), transparent 30%); }
.cal-day-heat-3 { background: linear-gradient(90deg, rgba(16,185,129,.08), transparent 30%); }

.cal-day-events {
  display: flex; flex-direction: column;
  gap: 3px;
  min-height: 0;
}
.cal-ev {
  position: relative;
  display: flex; align-items: center; gap: 5px;
  padding: 3px 7px 3px 5px;
  font-size: 11px; font-weight: 500;
  color: var(--text);
  background: #fff;
  border: 1px solid color-mix(in srgb, var(--ev-color, #64748b) 60%, transparent);
  border-left: 3px solid var(--ev-color, #64748b);
  border-radius: 5px;
  text-decoration: none !important;
  cursor: pointer;
  transition: transform .1s, box-shadow .12s, background .12s;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  font-family: inherit;
}
.cal-ev:hover {
  background: color-mix(in srgb, var(--ev-color, #64748b) 10%, #fff);
  transform: translateX(2px);
  box-shadow: 0 2px 8px rgba(15,23,42,.12);
}
.cal-ev-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--ev-color, #64748b);
  flex-shrink: 0;
}
.cal-ev-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  font-weight: 600;
  color: var(--ev-color, #64748b);
  flex-shrink: 0;
}
.cal-ev-text { overflow: hidden; text-overflow: ellipsis; min-width: 0; }
.cal-more {
  font-size: 10.5px;
  color: var(--text-3);
  padding: 2px 6px;
  font-style: italic;
}

/* ---- List view ---- */
.cal-list { display: flex; flex-direction: column; gap: 14px; }
.cal-list-group {
  display: grid;
  grid-template-columns: 110px 1fr;
  gap: 14px;
  padding: 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  box-shadow: var(--shadow-sm);
}
.cal-list-group.is-today {
  border-color: var(--theme-accent);
  box-shadow: 0 0 0 3px var(--theme-accent-soft), var(--shadow-sm);
}
.cal-list-date {
  display: flex; flex-direction: column; align-items: center;
  text-align: center;
  padding: 10px 6px;
  background: var(--surface-2);
  border-radius: 10px;
  gap: 2px;
  align-self: start;
}
.cal-list-group.is-today .cal-list-date {
  background: linear-gradient(135deg, var(--theme-accent), var(--theme-accent-2));
  color: #fff;
}
.cal-list-dd {
  font-size: 32px; font-weight: 800;
  font-family: 'JetBrains Mono', monospace;
  line-height: 1;
  color: inherit;
}
.cal-list-mm { font-size: 13px; font-weight: 600; color: inherit; margin-top: 4px; }
.cal-list-dw { font-size: 11px; color: inherit; opacity: .7; }
.cal-list-today {
  margin-top: 6px;
  font-size: 10px; font-weight: 700;
  letter-spacing: .03em;
  color: inherit;
}
.cal-list-today .fa-circle { font-size: 6px; color: #a7f3d0; }

.cal-list-items { display: flex; flex-direction: column; gap: 8px; min-width: 0; }
.cal-list-item {
  position: relative;
  display: grid;
  grid-template-columns: 4px 1fr auto;
  gap: 10px;
  padding: 10px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  text-decoration: none !important;
  transition: transform .12s, box-shadow .15s, border-color .12s;
  cursor: pointer;
  color: var(--text);
}
.cal-list-item:hover {
  transform: translateX(3px);
  border-color: var(--ev-color, var(--theme-accent));
  box-shadow: 0 6px 14px rgba(15,23,42,.08);
}
.cal-list-stripe {
  background: var(--ev-color, #64748b);
  border-radius: 4px;
}
.cal-list-main { min-width: 0; }
.cal-list-head-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.cal-list-no {
  background: var(--surface-2);
  padding: 2px 8px;
  border-radius: 6px;
  font-size: 12px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text-2);
}
.cal-list-purpose {
  font-size: 14px; font-weight: 600;
  margin-top: 4px;
  color: var(--text);
  overflow: hidden; text-overflow: ellipsis;
  display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical;
}
.cal-list-meta {
  display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
  margin-top: 6px;
  font-size: 11.5px;
  color: var(--text-2);
}
.cal-list-meta span { display: inline-flex; align-items: center; gap: 4px; }
.cal-list-meta i { color: var(--text-3); font-size: 11px; }
.cal-list-arrow {
  align-self: center;
  color: var(--text-3);
  font-size: 14px;
  padding: 0 4px;
  transition: transform .12s, color .12s;
}
.cal-list-item:hover .cal-list-arrow { color: var(--ev-color, var(--theme-accent-2)); transform: translateX(3px); }

/* ---- Legend ---- */
.cal-legend {
  display: flex; align-items: center; gap: 14px;
  flex-wrap: wrap;
  padding: 10px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 12px;
  color: var(--text-2);
}
.cal-legend-title { font-weight: 600; color: var(--text); }
.cal-legend-item { display: inline-flex; align-items: center; gap: 6px; }
.cal-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  box-shadow: 0 2px 4px rgba(0,0,0,.15);
}

/* ---- Responsive ---- */
@media (max-width: 900px) {
  .cal-toolbar { padding: 12px; }
  .cal-main.is-month .cal-day { min-height: 92px; padding: 5px; }
  .cal-main.is-month .cal-head-cell { padding: 7px 4px; font-size: 11px; }
  .cal-list-group { grid-template-columns: 86px 1fr; gap: 10px; padding: 12px; }
  .cal-list-dd { font-size: 26px; }
}
@media (max-width: 640px) {
  .cal-hero { padding: 18px 18px; border-radius: 16px; }
  .cal-hero-h { font-size: 18px; }
  .cal-hero-icon { width: 48px; height: 48px; font-size: 22px; }
  .hide-sm { display: none; }
  .cal-ev-text { display: none; }
  .cal-ev { justify-content: center; padding: 3px 4px; }
  .cal-ev-time { font-size: 9.5px; }
  .cal-main.is-month .cal-day { min-height: 70px; }
  .cal-day-count { display: none; }
  .cal-stats { grid-template-columns: 1fr 1fr; }
  .cal-stat-chart { grid-column: span 2; }
  .cal-list-group { grid-template-columns: 72px 1fr; }
  .cal-list-dd { font-size: 22px; }
  .cal-list-item { padding: 8px 10px; }
}
@media (max-width: 420px) {

  .cal-main.is-month .cal-head-cell { padding: 5px 2px; font-size: 10px; }
  .cal-day-num { font-size: 11px; }
  .cal-day-today .cal-day-num { width: 20px; height: 20px; font-size: 10px; }
  .cal-day-today-badge { display: none; }
  .cal-ev { padding: 2px; }
  .cal-ev-dot { width: 5px; height: 5px; }
  .cal-more { font-size: 9.5px; padding: 1px 3px; }
}

/* ---- Print ---- */
@media print {
  .cal-hero-actions, .cal-toolbar, .cal-filter-chips, .cal-legend { display: none !important; }
  .cal-hero { background: #fff !important; color: #0f172a !important; border: 2px solid var(--theme-accent) !important; box-shadow: none !important; }
  .cal-hero-h, .cal-hero-sub { color: #0f172a !important; text-shadow: none !important; }
  .cal-hero-icon { background: var(--theme-accent-soft) !important; border-color: var(--theme-accent) !important; color: var(--theme-accent-2) !important; }
  .cal-main.is-month .cal-day { min-height: 80px; break-inside: avoid; }
  .cal-stats { break-inside: avoid; }
  .cal-list-group, .cal-list-item { break-inside: avoid; }
  .cal-ev { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
}

/* ================================================================
   MANAGEMENT PAGES — Vehicles / Drivers / Fuel / Maint / Users
   shared hero + stats + refined table
   ================================================================ */
.mgr-page { display: flex; flex-direction: column; gap: 16px; }

.mgr-hero {
  position: relative;
  overflow: hidden;
  border-radius: 18px;
  padding: 22px 24px;
  color: #fff;
  background: var(--theme-grad);
  box-shadow: 0 12px 32px -12px var(--theme-glow), 0 4px 12px rgba(15,23,42,.06);
}
.mgr-hero-decor {
  position: absolute; inset: 0;
  background:

.mgr-hero-inner {

.mgr-hero-title { display: flex; gap: 14px; align-items: center; }
.mgr-hero-icon {
  width: 52px; height: 52px;
  display: grid; place-items: center;
  font-size: 22px;
  background: rgba(255,255,255,.22);

.mgr-hero-h {

.mgr-hero-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

.mgr-search {

.mgr-stats {

}

}

.mgr-stat-ico {

  border-radius: 12px;

.mgr-stat-num {
  font-size: 22px; font-weight: 700;

.mgr-tablecard { padding: 0; }

.mgr-tablecard .table th:first-child,
.mgr-tablecard .table td:first-child { padding-left: 20px; }
.mgr-tablecard .table th:last-child,
.mgr-tablecard .table td:last-child  { padding-right: 20px; }

/* Primary cell with icon + two lines */
.cell-primary { display: flex; align-items: center; gap: 10px; }
.cell-ico-round {
  width: 38px; height: 38px;
  flex-shrink: 0;
  display: grid; place-items: center;
  border-radius: 10px;
  color: #fff;
  font-size: 16px;
  box-shadow: 0 3px 8px rgba(0,0,0,.12), inset 0 1px 0 rgba(255,255,255,.3);
}
.cell-main { font-weight: 700; color: var(--text); }
.cell-sub  { font-size: 11.5px; color: var(--text-3); margin-top: 1px; }
.cell-num  { font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums; font-weight: 600; }

.hide-xs { display: inline; }
@media (max-width: 520px) {
  .hide-xs { display: none; }
  .mgr-search { min-width: auto; flex: 1; }
  .mgr-stats { grid-template-columns: 1fr 1fr; }
  .cell-ico-round { display: none; }
}

/* ================================================================
   REPORTS — Premium (hero + type cards + presets + chart + table)
   ================================================================ */
.rpt-page { display: flex; flex-direction: column; gap: 18px; }

/* Hero */
.rpt-hero {
  position: relative;
  overflow: hidden;
  border-radius: 18px;
  padding: 22px 26px;
  color: #fff;
  background: var(--theme-grad);
  box-shadow: 0 12px 34px -12px var(--theme-glow), 0 4px 12px rgba(15,23,42,.06);
}
.rpt-hero-decor {
  position: absolute; inset: 0;
  background:
    radial-gradient(circle at 15% 20%, rgba(255,255,255,.22), transparent 45%),
    radial-gradient(circle at 85% 85%, rgba(255,255,255,.12), transparent 50%);
  pointer-events: none;
}
.rpt-hero-inner { position: relative; }
.rpt-hero-title { display: flex; gap: 14px; align-items: center; }
.rpt-hero-icon {
  width: 54px; height: 54px;
  display: grid; place-items: center;
  font-size: 24px;
  background: rgba(255,255,255,.22);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,.3);
  border-radius: 14px;
  box-shadow: 0 6px 14px rgba(0,0,0,.15);
}
.rpt-hero-h { font-size: 21px; font-weight: 700; color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,.15); margin: 0; }
.rpt-hero-sub { font-size: 13px; color: rgba(255,255,255,.9); margin-top: 4px; line-height: 1.5; }

/* Type cards */
.rpt-type-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 12px;
}
.rpt-type-card {
  position: relative;
  display: flex; gap: 14px; align-items: center;
  padding: 16px;
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 14px;
  cursor: pointer;
  text-align: left;
  font-family: inherit;
  transition: transform .15s, border-color .15s, box-shadow .15s, background .15s;
}
.rpt-type-card:hover { transform: translateY(-2px); box-shadow: 0 8px 18px rgba(15,23,42,.08); border-color: var(--border-2); }
.rpt-type-card.active {
  border-color: var(--theme-accent);
  background: linear-gradient(135deg, var(--theme-accent-soft), rgba(255,255,255,.5));
  box-shadow: 0 0 0 4px var(--theme-accent-soft), 0 10px 22px -6px var(--theme-glow);
}
.rpt-type-card.active::after {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--theme-grad);
  border-radius: 14px 14px 0 0;
}
.rpt-type-ico {
  flex-shrink: 0;
  width: 46px; height: 46px;
  display: grid; place-items: center;
  border-radius: 12px;
  color: #fff;
  box-shadow: 0 4px 10px rgba(0,0,0,.15), inset 0 1px 0 rgba(255,255,255,.3);
}
.rpt-type-ico i { font-size: 22px; filter: drop-shadow(0 1px 2px rgba(0,0,0,.25)); }
.rpt-type-body { flex: 1; min-width: 0; }
.rpt-type-label { font-size: 14px; font-weight: 700; color: var(--text); }
.rpt-type-sub { font-size: 11.5px; color: var(--text-2); margin-top: 2px; line-height: 1.4; }
.rpt-type-check {
  opacity: 0;
  width: 24px; height: 24px;
  display: grid; place-items: center;
  color: var(--theme-accent-2);
  font-size: 18px;
  transition: opacity .15s, transform .15s;
}
.rpt-type-card.active .rpt-type-check { opacity: 1; transform: scale(1); }

/* Filter bar */
.rpt-filter {
  display: flex; justify-content: space-between; align-items: flex-end;
  gap: 16px; flex-wrap: wrap;
  padding: 16px 18px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  box-shadow: var(--shadow-sm);
}
.rpt-filter-grid {
  display: flex; gap: 14px; flex-wrap: wrap; flex: 1;
}
.rpt-filter-field { display: flex; flex-direction: column; gap: 6px; min-width: 160px; }
.rpt-filter-field > span {
  font-size: 11.5px; color: var(--text-3); font-weight: 600; letter-spacing: .02em;
  display: inline-flex; align-items: center; gap: 5px;
}
.rpt-filter-field input[type="date"] {
  padding: 9px 12px;
  border: 1.5px solid var(--border);
  border-radius: 9px;
  font-size: 13.5px;
  font-family: inherit;
  background: var(--surface);
  color: var(--text);
  transition: border-color .12s, box-shadow .12s;
}
.rpt-filter-field input[type="date"]:focus {
  outline: none;
  border-color: var(--theme-accent);
  box-shadow: 0 0 0 3px var(--theme-accent-soft);
}
.rpt-presets { min-width: 260px; flex: 2; }
.rpt-preset-row { display: flex; gap: 4px; flex-wrap: wrap; }
.rpt-preset {
  padding: 7px 12px;
  font-size: 12px;
  font-weight: 500;
  background: var(--surface-2);
  border: 1.5px solid transparent;
  border-radius: 8px;
  color: var(--text-2);
  cursor: pointer;
  font-family: inherit;
  transition: all .12s;
}
.rpt-preset:hover { background: var(--border); color: var(--text); }
.rpt-preset.active {
  background: var(--theme-accent-soft);
  color: var(--theme-accent-2);
  border-color: var(--theme-accent);
  font-weight: 600;
}
.rpt-filter-actions { display: flex; gap: 10px; align-items: flex-end; }
.rpt-filter-actions .btn-app-ghost {
  background: var(--surface-2);
  color: var(--text-2);
  border: 1px solid var(--border);
  backdrop-filter: none;
}
.rpt-filter-actions .btn-app-ghost:hover { background: var(--border); color: var(--text); }

/* Result head */
.rpt-output { display: flex; flex-direction: column; gap: 16px; }
.rpt-result-head { padding: 16px 20px; }
.rpt-result-head-inner {
  display: flex; justify-content: space-between; align-items: center;
  gap: 14px; flex-wrap: wrap;
}
.rpt-result-title { display: flex; gap: 12px; align-items: center; min-width: 0; }
.rpt-result-ico {
  width: 42px; height: 42px;
  display: grid; place-items: center;
  background: var(--theme-grad);
  color: #fff;
  border-radius: 11px;
  font-size: 18px;
  box-shadow: 0 4px 10px var(--theme-glow);
}
.rpt-result-title h3 { font-size: 16px; margin: 0; color: var(--text); }
.rpt-result-meta { font-size: 11.5px; color: var(--text-3); margin-top: 2px; }
.rpt-result-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.rpt-search-wrap {
  position: relative;
  display: flex; align-items: center;
  background: var(--surface-2);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 0 12px 0 32px;
  min-width: 200px;
  transition: border-color .12s, background .12s;
}
.rpt-search-wrap:focus-within { border-color: var(--theme-accent); background: #fff; box-shadow: 0 0 0 3px var(--theme-accent-soft); }
.rpt-search-wrap i { position: absolute; left: 11px; color: var(--text-3); font-size: 12px; }
.rpt-search-wrap input {
  flex: 1; min-width: 0;
  padding: 8px 0;
  background: transparent;
  border: none; outline: none;
  font-size: 13px; font-family: inherit;
}

/* KPI row */
.rpt-kpi-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
}
.rpt-kpi {
  display: flex; gap: 12px; align-items: center;
  padding: 14px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  box-shadow: var(--shadow-sm);
  transition: transform .15s, box-shadow .15s;
}
.rpt-kpi:hover { transform: translateY(-2px); box-shadow: 0 8px 18px rgba(15,23,42,.08); }
.rpt-kpi-ico {
  flex-shrink: 0;
  width: 44px; height: 44px;
  display: grid; place-items: center;
  border-radius: 12px;
  font-size: 20px;
  color: #fff;
  box-shadow: 0 4px 10px rgba(0,0,0,.12), inset 0 1px 0 rgba(255,255,255,.3);
}
.rpt-kpi-num {
  font-size: 22px; font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text);
  font-variant-numeric: tabular-nums;
  line-height: 1.1;
}
.rpt-kpi-lb { font-size: 11.5px; color: var(--text-2); margin-top: 2px; }

/* Chart card */
.rpt-chart-card { padding: 18px 20px; }
.rpt-chart-wrap { position: relative; height: 260px; margin-top: 8px; }

/* Table */
.rpt-table-card { padding: 0; }
.rpt-table-card .table-wrap { border: none; border-radius: 14px; overflow-x: auto; }
.rpt-table-card .table th { background: var(--surface-2); position: sticky; top: 0; }
.rpt-th-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: transparent;
  border: none;
  padding: 2px 6px;
  margin: -2px -6px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-2);
  text-transform: uppercase;
  letter-spacing: .03em;
  cursor: pointer;
  font-family: inherit;
  transition: background .12s, color .12s;
}
.rpt-th-btn:hover { background: var(--border); color: var(--text); }
.rpt-th-btn i { font-size: 10px; opacity: .6; }
.rpt-table-card .table tfoot th {
  background: linear-gradient(180deg, var(--surface-2), var(--border));
  font-weight: 700; color: var(--theme-accent-2);
  position: static;
  font-size: 13px;
}
.rpt-table-card .table .text-right { text-align: right; }
.rpt-table-card .table .cell-num { font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums; }

/* Empty */
.rpt-empty-card { text-align: center; }

/* Responsive */
@media (max-width: 720px) {
  .rpt-hero { padding: 18px; }
  .rpt-hero-h { font-size: 18px; }
  .rpt-hero-icon { width: 46px; height: 46px; font-size: 20px; }
  .rpt-type-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
  .rpt-type-card { padding: 12px; gap: 10px; }
  .rpt-type-ico { width: 40px; height: 40px; }
  .rpt-type-ico i { font-size: 18px; }
  .rpt-type-label { font-size: 13px; }
  .rpt-type-sub { display: none; }
  .rpt-type-check { display: none; }
  .rpt-filter { padding: 12px; }
  .rpt-filter-grid { flex-direction: column; gap: 10px; }
  .rpt-filter-field { min-width: auto; }
  .rpt-filter-actions { width: 100%; }
  .rpt-filter-actions .btn-app { flex: 1; justify-content: center; }
  .rpt-result-head-inner { flex-direction: column; align-items: stretch; }
  .rpt-result-actions { width: 100%; }
  .rpt-search-wrap { flex: 1; min-width: auto; }
  .rpt-chart-wrap { height: 220px; }
}
@media (max-width: 440px) {
  .rpt-type-grid { grid-template-columns: 1fr; }
  .rpt-kpi-row { grid-template-columns: 1fr 1fr; }
}

/* Print */
@media print {
  .rpt-hero-decor { display: none; }
  .rpt-filter, .rpt-type-grid, .rpt-result-actions, .rpt-preset-row, .rpt-filter-actions { display: none !important; }
  .rpt-result-head, .rpt-kpi, .rpt-chart-card, .rpt-table-card { break-inside: avoid; box-shadow: none !important; }
  .rpt-hero { background: #fff !important; color: #0f172a !important; border: 2px solid var(--theme-accent) !important; box-shadow: none !important; }
  .rpt-hero-h, .rpt-hero-sub { color: #0f172a !important; text-shadow: none !important; }
  .rpt-hero-icon { background: var(--theme-accent-soft) !important; border-color: var(--theme-accent) !important; color: var(--theme-accent-2) !important; }
  .rpt-kpi-ico, .rpt-result-ico { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
}

/* ================================================================
   SCHEDULE — ตารางใช้รถ (Gantt-like timeline per vehicle)

.sch-hero {

  border-radius: 18px;
  padding: 22px 24px;

  box-shadow: 0 12px 32px -12px var(--theme-glow), 0 4px 12px rgba(15,23,42,.06);

  display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap;

  box-shadow: var(--shadow-sm);
