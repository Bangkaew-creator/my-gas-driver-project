.sch-day-num { font-size: 13px; font-weight: 700; color: inherit; }
.sch-day-mm { font-size: 10px; }

.sch-grid-body {
  display: flex; flex-direction: column;
}
.sch-row {
  display: grid;
  grid-template-columns: 220px 1fr;
  border-bottom: 1px solid var(--border);
  transition: background .12s;
}
.sch-row:hover { background: var(--surface-2); }
.sch-row:last-child { border-bottom: none; }

.sch-vinfo {
  padding: 10px 14px;
  border-right: 1px solid var(--border);
  background: var(--surface);
  display: flex; flex-direction: column; gap: 2px;
  justify-content: center;
}
.sch-vplate { font-size: 14px; font-weight: 700; color: var(--text); }
.sch-vsub { font-size: 11.5px; color: var(--text-3); }
.sch-vmeta { display: flex; gap: 8px; align-items: center; margin-top: 4px; flex-wrap: wrap; }
.sch-v-seats {
  font-size: 11px; font-weight: 600;
  color: var(--text-2);
  display: inline-flex; align-items: center; gap: 3px;
}
.sch-v-status {
  display: inline-block;
  padding: 1px 8px;
  border-radius: 999px;
  font-size: 10.5px; font-weight: 600;
  letter-spacing: .02em;
}
.v-status-avail { background: #d1fae5; color: #047857; border: 1px solid #6ee7b7; }
.v-status-inuse { background: #ede9fe; color: #6d28d9; border: 1px solid #c4b5fd; }
.v-status-maint { background: #fef3c7; color: #b45309; border: 1px solid #fcd34d; }
.v-status-other { background: var(--surface-2); color: var(--text-3); border: 1px solid var(--border); }
.sch-v-count { font-size: 10.5px; color: var(--text-3); margin-top: 2px; }

.sch-track {
  position: relative;
  min-height: 60px;
  background: repeating-linear-gradient(
    90deg,
    transparent,
    transparent calc((100% - 1px) / 7),
    rgba(148,163,184,.12) calc((100% - 1px) / 7),
    rgba(148,163,184,.12) 100%);
}
.sch-cell {
  position: absolute;
  top: 0; bottom: 0;
  border-right: 1px solid var(--border);
  pointer-events: none;
}
.sch-cell.is-weekend { background: rgba(148,163,184,.05); }
.sch-cell.is-today {
  background: linear-gradient(180deg, var(--theme-accent-soft), transparent);
}

.sch-bar {
  position: absolute;
  top: 14px;
  height: calc(100% - 28px);
  min-width: 18px;
  display: flex; align-items: center; justify-content: center;
  padding: 0 8px;
  border-radius: 7px;
  font-size: 11px;
  font-weight: 600;
  color: #fff;
  cursor: pointer;
  overflow: hidden;
  white-space: nowrap;
  box-shadow: 0 3px 8px rgba(0,0,0,.15), inset 0 1px 0 rgba(255,255,255,.2);
  transition: transform .12s, box-shadow .15s;
  z-index: 1;
}
.sch-bar:hover {
  transform: translateY(-1px) scale(1.02);
  box-shadow: 0 5px 14px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.3);
  z-index: 2;
}
.sch-bar-text { text-overflow: ellipsis; overflow: hidden; }
.sch-bar-approved_l1 { background: linear-gradient(135deg, #60a5fa, #2563eb); }
.sch-bar-approved    { background: linear-gradient(135deg, #34d399, #059669); }
.sch-bar-in_progress { background: linear-gradient(135deg, #a78bfa, #6d28d9); }

.sch-legend {
  display: flex; align-items: center; gap: 14px;
  flex-wrap: wrap;
  padding: 10px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 12px;
  color: var(--text-2);
}
.sch-legend-title { font-weight: 700; color: var(--text); }
.sch-legend-item { display: inline-flex; align-items: center; gap: 6px; }

@media (max-width: 900px) {
  .sch-card { overflow-x: auto; }
  .sch-grid { min-width: 640px; }
  .sch-vinfo, .sch-vinfo-head { padding: 8px 10px; }
  .sch-grid-head, .sch-row { grid-template-columns: 160px 1fr; }
  .sch-vplate { font-size: 13px; }
}

/* ================================================================
   ASSIGN modal — unavailable vehicles with reasons
   ================================================================ */
.assign-info {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px;
  background: var(--theme-accent-soft);
  color: var(--theme-accent-2);
  border-left: 3px solid var(--theme-accent);
  border-radius: 8px;
  font-size: 12.5px;
  margin-bottom: 14px;
}
.assign-unavail {
  margin-top: 12px;
  padding: 10px 12px;
  background: #fff7ed;
  border: 1px solid #fed7aa;
  border-radius: 10px;
}
.assign-unavail-head {
  display: flex; align-items: center; gap: 8px;
  font-size: 12.5px; font-weight: 700;
  color: #c2410c;
}
.assign-unavail-body { margin-top: 6px; }
.assign-unavail-body summary {
  cursor: pointer;
  font-size: 11.5px;
  color: #ea580c;
  padding: 3px 0;
  font-weight: 600;
}
.assign-unavail-list {
  list-style: none; padding: 6px 0 0; margin: 0;
  display: flex; flex-direction: column; gap: 8px;
}
.assign-unavail-list li {
  padding: 8px 10px;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 8px;
}
.assign-unavail-v { font-size: 13px; color: var(--text); display: flex; gap: 8px; align-items: baseline; }
.assign-reasons { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 5px; }
.assign-reason-tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 10.5px; font-weight: 600;
}
.reason-conflict    { background: #fee2e2; color: #b91c1c; border: 1px solid #fca5a5; }
.reason-seats       { background: #fef3c7; color: #b45309; border: 1px solid #fcd34d; }
.reason-maintenance { background: #fef3c7; color: #b45309; border: 1px solid #fcd34d; }
.reason-retired     { background: var(--surface-2); color: var(--text-3); border: 1px solid var(--border); }
.assign-conflicts {
  margin-top: 6px;
  padding: 6px 8px;
  background: #fef2f2;
  border-radius: 6px;
  display: flex; flex-direction: column; gap: 3px;
}
.assign-conflict {
  font-size: 11px;
  color: var(--text-2);
  display: flex; gap: 6px; flex-wrap: wrap;
}
.assign-conflict code {
  background: #fff;
  padding: 1px 6px;
  border-radius: 4px;
  font-size: 10.5px;
  border: 1px solid var(--border);
}

/* ================================================================
   AVAILABILITY PREVIEW — ในฟอร์มสร้างคำขอ
   ================================================================ */
.avail-preview {
  margin-top: 6px;
  padding: 14px 16px;
  background: linear-gradient(180deg, var(--surface), var(--surface-2));
  border: 1.5px dashed var(--border-2);
  border-radius: 14px;
  display: flex; flex-direction: column; gap: 12px;
}
.avail-empty {
  display: flex; align-items: center; gap: 10px;
  color: var(--text-2);
  font-size: 13px;
  padding: 6px 2px;
}
.avail-empty i { color: var(--theme-accent-2); font-size: 16px; }
.avail-empty.avail-err { color: #b91c1c; }
.avail-empty.avail-err i { color: #b91c1c; }

.avail-head {
  display: flex; justify-content: space-between; align-items: center;
  gap: 10px; flex-wrap: wrap;
}
.avail-head-title { display: flex; align-items: center; gap: 8px; font-size: 13.5px; color: var(--text); }
.avail-head-title i { color: var(--theme-accent-2); font-size: 16px; }
.avail-head-stats { display: flex; gap: 6px; flex-wrap: wrap; }
.avail-chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 11.5px; font-weight: 700;
  letter-spacing: .02em;
}
.avail-chip-ok { background: #d1fae5; color: #047857; border: 1px solid #6ee7b7; }
.avail-chip-no { background: #fee2e2; color: #b91c1c; border: 1px solid #fca5a5; }

.avail-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 10px;
}
.avail-card {
  position: relative;
  padding: 12px;
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  transition: transform .12s, box-shadow .15s, border-color .15s;
}
.avail-card.is-avail { border-color: #6ee7b7; background: linear-gradient(180deg, #ecfdf5, #fff); }
.avail-card.is-busy  { background: linear-gradient(180deg, #fef2f2, #fff); }
.avail-card.is-match { box-shadow: 0 0 0 3px var(--theme-accent-soft); }
.avail-card:hover { transform: translateY(-2px); box-shadow: 0 8px 18px rgba(15,23,42,.08); }

.avail-card-head {
  display: flex; gap: 10px; align-items: center;
}
.avail-card-ico {
  flex-shrink: 0;
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 10px;
  color: #fff;
  box-shadow: 0 3px 8px rgba(0,0,0,.12), inset 0 1px 0 rgba(255,255,255,.3);
}
.avail-card-ico i { font-size: 18px; filter: drop-shadow(0 1px 2px rgba(0,0,0,.2)); }
.avail-card-title { flex: 1; min-width: 0; }
.avail-card-plate { font-size: 14px; font-weight: 700; color: var(--text); }
.avail-card-sub { font-size: 11.5px; color: var(--text-3); margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.avail-card-sub i { font-size: 10px; margin-right: 2px; }

.avail-card-status {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 11px; font-weight: 700;
  letter-spacing: .02em;
}
.avail-card-status.is-avail { background: #10b981; color: #fff; }
.avail-card-status.is-busy  { background: #ef4444; color: #fff; }

.avail-card-reasons { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; }
.avail-reason-tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 10.5px; font-weight: 600;
  letter-spacing: .02em;
}
.avail-reason-tag.reason-conflict    { background: #fee2e2; color: #b91c1c; border: 1px solid #fca5a5; }
.avail-reason-tag.reason-seats       { background: #fef3c7; color: #b45309; border: 1px solid #fcd34d; }
.avail-reason-tag.reason-maintenance { background: #fef3c7; color: #b45309; border: 1px solid #fcd34d; }
.avail-reason-tag.reason-retired     { background: var(--surface-2); color: var(--text-3); border: 1px solid var(--border); }

.avail-card-conflicts {
  margin-top: 6px;
  padding: 6px 8px;
  background: rgba(239,68,68,.05);
  border-left: 2px solid #f87171;
  border-radius: 0 6px 6px 0;
  display: flex; flex-direction: column; gap: 3px;
}
.avail-conflict-line {
  font-size: 10.5px;
  color: var(--text-2);
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
}
.avail-conflict-line i { color: #b91c1c; }
.avail-conflict-line code {
  background: #fff;
  padding: 1px 6px;
  border-radius: 4px;
  font-size: 10px;
  border: 1px solid var(--border);
  margin-left: auto;
}

@media (max-width: 560px) {
  .avail-preview { padding: 12px; }
  .avail-grid { grid-template-columns: 1fr; }
}

/* License expiry tags */
.lic-tag {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10.5px; font-weight: 600;
  padding: 2px 8px;
  border-radius: 999px;
  margin-left: 6px;
  letter-spacing: .02em;
}
.lic-tag.expired { background: #fee2e2; color: #b91c1c; border: 1px solid #fca5a5; }
.lic-tag.warn    { background: #fef3c7; color: #b45309; border: 1px solid #fcd34d; }

/* Role pills */
.role-pill {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 999px;
  font-size: 11.5px; font-weight: 600;
  letter-spacing: .02em;
}
.role-admin    { background: #fee2e2; color: #b91c1c; border: 1px solid #fca5a5; }
.role-manager  { background: #dbeafe; color: #1d4ed8; border: 1px solid #93c5fd; }
.role-approver { background: #ede9fe; color: #6d28d9; border: 1px solid #c4b5fd; }
.role-user     { background: #d1fae5; color: #047857; border: 1px solid #6ee7b7; }
.role-driver   { background: #fef3c7; color: #b45309; border: 1px solid #fcd34d; }

/* ================================================================
   Calendar
   ================================================================ */
.calendar-head { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  gap: 1px;
}
.calendar-dayname {
  background: var(--surface-2);
  padding: 8px;
  text-align: center;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-2);
}
.calendar-cell {
  background: var(--surface);
  padding: 8px;
  min-height: 94px;
  font-size: 12px;
  position: relative;
}
.calendar-cell.muted { background: var(--surface-2); color: var(--text-3); }
.calendar-cell.today { background: #fffbeb; }
.calendar-cell.today .calendar-date { color: var(--accent-2); font-weight: 700; }
.calendar-date { font-weight: 600; color: var(--text); margin-bottom: 4px; }
.calendar-event {
  display: block;
  font-size: 10.5px;
  padding: 3px 6px;
  border-radius: 4px;
  margin-bottom: 2px;
  background: rgba(59,130,246,.12);
  color: var(--info);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  cursor: pointer;
  border-left: 2px solid var(--info);
}
.calendar-event:hover { background: rgba(59,130,246,.2); }

/* workflow steps */
.steps { display: flex; gap: 8px; margin: 12px 0 18px; flex-wrap: wrap; }
.step {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 12px;
  background: var(--surface-2);
  border-radius: 999px;
  font-size: 12px;
  color: var(--text-2);
}
.step.done { background: #dcfce7; color: #166534; }
.step.now  { background: var(--accent); color: #fff; font-weight: 600; }
.step-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }

/* history timeline */
.timeline { border-left: 2px solid var(--border); margin-left: 8px; padding-left: 16px; }
.timeline-item { position: relative; padding: 8px 0; }
.timeline-item::before {
  content: ''; position: absolute; left: -22px; top: 14px;
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--primary); border: 2px solid var(--surface);
  box-shadow: 0 0 0 2px var(--primary);
}
.timeline-item.success::before { background: var(--success); box-shadow: 0 0 0 2px var(--success); }
.timeline-item.danger::before  { background: var(--danger);  box-shadow: 0 0 0 2px var(--danger); }
.timeline-head { font-size: 13px; font-weight: 500; }
.timeline-meta { font-size: 11.5px; color: var(--text-3); }
.timeline-body { font-size: 13px; color: var(--text-2); margin-top: 4px; }

/* empty state */
.empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-3);
}
.empty-icon { font-size: 40px; margin-bottom: 10px; opacity: .5; }

/* ================================================================
   Responsive
   ================================================================ */
.sidebar-backdrop { display: none; }

@media (max-width: 900px) {
  .app-shell { grid-template-columns: 1fr; }
  .sidebar {
    position: fixed;
    left: 0; top: 0; bottom: 0;
    width: 78vw; max-width: var(--sidebar-w);
    transform: translateX(-100%);
    transition: transform .2s ease;
    z-index: 30;
  }
  .sidebar.open { transform: translateX(0); box-shadow: var(--shadow-lg); }
  .hamburger { display: inline-block; }

  .sidebar-backdrop {
    display: block;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.45);
    z-index: 25;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s ease;
  }
  .sidebar-backdrop.show {
    opacity: 1;
    pointer-events: auto;
  }
  body.sidebar-locked { overflow: hidden; }
}

/* helpers */
.flex { display: flex; gap: 8px; align-items: center; }
.flex-wrap { flex-wrap: wrap; }
.gap-sm { gap: 6px; }
.mt-sm { margin-top: 8px; }
.mt-md { margin-top: 16px; }
.text-muted { color: var(--text-3); }
.text-sm { font-size: 12px; }
.text-right { text-align: right; }
.nowrap { white-space: nowrap; }
.col-2 { grid-column: span 2; }
.full { grid-column: 1 / -1; }

/* ================================================================
   Fill-in rules — class names used by Views.html that were missing
   ================================================================ */

/* Forms */
.form-row {
  display: grid; gap: 14px;
  grid-template-columns: 1fr 1fr;
  margin-bottom: 12px;
}
.form-row > .field { margin: 0; }
.form-actions {
  display: flex; justify-content: flex-end; gap: 10px;
  margin-top: 18px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
}
.req { color: var(--danger); font-weight: 700; }

/* Request detail */
.detail-grid {
  display: grid; gap: 16px;
  grid-template-columns: 1fr;
}
@media (min-width: 1100px) {
  .detail-grid { grid-template-columns: 2fr 1fr; }
  .detail-grid > .card:first-child { grid-row: span 2; }
}
.kv {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px 20px;
}
.kv > div { display: grid; grid-template-columns: 140px 1fr; gap: 8px; align-items: baseline; }
.kv dt { margin: 0; font-size: 12px; color: var(--text-3); text-transform: uppercase; letter-spacing: .03em; }
.kv dd { margin: 0; font-size: 14px; color: var(--text); word-break: break-word; }
.card-actions-bar {
  display: flex; flex-wrap: wrap; gap: 8px;
  margin-top: 16px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
}

/* Timeline dot (Views.html emits its own dot <div>) */
.timeline-dot {
  position: absolute;
  left: -22px; top: 14px;
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--primary);
  box-shadow: 0 0 0 2px var(--surface), 0 0 0 4px var(--primary);
}
.timeline-item { padding-left: 0; }
.timeline-remark { font-size: 13px; color: var(--text-2); margin-top: 4px; }

/* Calendar (Views uses .cal-*; earlier styles used .calendar-*) */
.cal {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--border);
}
.cal-nav { display: flex; gap: 10px; align-items: center; }
.cal-head-row {
  display: grid; grid-template-columns: repeat(7, 1fr);
  background: var(--surface-2);
  gap: 1px;
}
.cal-head-cell {
  padding: 8px 10px;
  font-size: 12px; font-weight: 600; color: var(--text-2);
  text-align: center;
  background: var(--surface-2);
}
.cal-week {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 1px;
  background: var(--border);
}
.cal-day {
  background: var(--surface);
  min-height: 92px;
  padding: 6px 8px;
  display: flex; flex-direction: column; gap: 4px;
}
.cal-day-out { background: var(--surface-2); color: var(--text-3); }
.cal-day-num { font-size: 12px; font-weight: 600; color: var(--text-2); }
.cal-day-out .cal-day-num { color: var(--text-3); }
.cal-day-events { display: flex; flex-direction: column; gap: 3px; min-height: 0; }
.cal-ev {
  display: block;
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 11px;
  color: #fff;
  text-decoration: none;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  cursor: pointer;
}
.cal-ev:hover { opacity: .85; text-decoration: none; }
.cal-more { font-size: 11px; color: var(--text-3); }

/* Hover alias — Views uses both .table and .table-hover; .table already hovers */
.table-hover tr.clickable { cursor: pointer; }

/* Responsive: form rows collapse on mobile */
@media (max-width: 720px) {
  .form-row { grid-template-columns: 1fr; }
  .kv { grid-template-columns: 1fr; }
  .kv > div { grid-template-columns: 120px 1fr; }
}

/* ================================================================
   SUPER DASHBOARD — Glassmorphism + Gradient + Animations
   ================================================================ */
.dash { display: flex; flex-direction: column; gap: 20px; }

/* ---- Premium Hero ---- */
.dash-hero {
  position: relative;
  overflow: hidden;
  border-radius: 20px;
  padding: 28px 28px;
  color: #fff;
  background: var(--theme-grad);
  box-shadow: 0 14px 40px -12px var(--theme-glow), 0 4px 14px rgba(15,23,42,.08);
}
.dash-hero-decor {
  position: absolute; inset: 0;
  background:
    radial-gradient(circle at 15% 20%, rgba(255,255,255,.22), transparent 45%),
    radial-gradient(circle at 85% 80%, rgba(255,255,255,.14), transparent 50%),
    linear-gradient(120deg, rgba(255,255,255,0) 20%, rgba(255,255,255,.08) 50%, rgba(255,255,255,0) 80%);
  pointer-events: none;
  animation: heroShimmer 6s ease-in-out infinite;
}
@keyframes heroShimmer {
  0%,100% { transform: translateX(0); opacity: .9; }
  50%     { transform: translateX(10px); opacity: 1; }
}
.dash-hero-inner {
  position: relative;
  display: flex; justify-content: space-between; align-items: center;
  gap: 24px; flex-wrap: wrap;
}
.dash-hero-title { display: flex; gap: 16px; align-items: center; }
